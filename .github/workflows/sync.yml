name: Sync to Hugging Face
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Remove large binary from history
        run: |
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          pip install git-filter-repo
          git filter-repo --path assets/background_music.wav.mp3 --invert-paths --force

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push --force https://realametsikor:$HF_TOKEN@huggingface.co/spaces/realametsikor/radio-show-backend main
