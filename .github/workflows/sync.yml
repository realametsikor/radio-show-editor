name: Sync to Hugging Face
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          git rm --cached assets/background_music.wav.mp3 || true
          echo "assets/background_music.wav.mp3" >> .gitignore
          git add .gitignore
          git commit -m "exclude large binary from HF sync" || true
          git push --force https://realametsikor:$HF_TOKEN@huggingface.co/spaces/realametsikor/radio-show-backend main
